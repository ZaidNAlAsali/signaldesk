name: signaldesk

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signaldesk}
      POSTGRES_USER: ${POSTGRES_USER:-signaldesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signaldesk_dev_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signaldesk} -d ${POSTGRES_DB:-signaldesk}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    environment:
      SIGNALDESK_ENVIRONMENT: production
      SIGNALDESK_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-signaldesk}:${POSTGRES_PASSWORD:-signaldesk_dev_only}@db:5432/${POSTGRES_DB:-signaldesk}
      SIGNALDESK_AUTO_CREATE_SCHEMA: "false"
      SIGNALDESK_SEED_DEMO_DATA: "true"
      SIGNALDESK_AI_PROVIDER: demo
      SIGNALDESK_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
